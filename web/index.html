<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AegisRelay</title><style>
:root{color-scheme:dark;--bg:#08111e;--card:#111d2e;--line:#24344b;--text:#e8eef8;--muted:#91a0b7;--accent:#54d1b2;--danger:#ff7785}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0,#12334b 0,transparent 35%),var(--bg);font:15px system-ui;color:var(--text)}main{max-width:1120px;margin:auto;padding:36px 20px}header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}h1{margin:0;font-size:25px;letter-spacing:.4px}h1 span{color:var(--accent)}.card{background:#111d2ee8;border:1px solid var(--line);border-radius:16px;padding:22px;margin:16px 0;box-shadow:0 14px 40px #0005}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}.wide{grid-column:span 2}label{display:block;color:var(--muted);font-size:13px;margin-bottom:5px}input,textarea,select,button{width:100%;border-radius:9px;border:1px solid var(--line);background:#091421;color:var(--text);padding:11px}textarea{min-height:86px;resize:vertical}button{cursor:pointer;background:#19364a}button.primary{background:var(--accent);color:#05251d;font-weight:700}.danger{color:var(--danger)}.muted{color:var(--muted)}.route{display:grid;grid-template-columns:minmax(140px,1fr) minmax(180px,2fr) auto;align-items:center;gap:12px;border-top:1px solid var(--line);padding:16px 0}.route code{color:var(--accent)}.actions{display:flex;gap:7px}.route button{width:auto;padding:8px 10px}.hidden{display:none}.secret{white-space:pre-wrap;word-break:break-all;background:#07101b;padding:12px;border-radius:8px;border:1px dashed var(--accent)}nav button{width:auto;margin-left:8px}.pill{display:inline-block;font-size:12px;border:1px solid var(--line);border-radius:99px;padding:3px 8px;margin:2px}pre{white-space:pre-wrap}.notice{border-left:3px solid var(--accent);padding-left:12px}@media(max-width:720px){.route{grid-template-columns:1fr}.wide{grid-column:auto}}</style></head><body><main>
<header><h1><span>AEGIS</span> RELAY</h1><nav id="nav" class="hidden"><button data-page="routes">节点</button><button data-page="diagnostics">线路状态</button><button data-page="audit">审计</button><button id="logout">退出</button></nav></header>
<section id="gate" class="card"><h2>安全登录</h2><p class="muted">管理端使用密码 + TOTP。会话仅通过 HttpOnly Cookie 保存。</p><div id="setup" class="hidden"><div class="grid"><div><label>管理员名称</label><input id="su-user" value="admin"></div><div><label>强密码（至少 14 位）</label><input id="su-pass" type="password"></div><div><label>部署生成的 Setup Token</label><input id="su-token" type="password"></div></div><p><button id="setup-btn" class="primary">初始化并生成 2FA</button></p></div><div id="login" class="hidden"><div class="grid"><div><label>密码</label><input id="password" type="password"></div><div><label>6 位动态码</label><input id="code" inputmode="numeric" maxlength="6"></div></div><p><button id="login-btn" class="primary">登录</button></p></div><p id="gate-msg" class="danger"></p></section>
<section id="app" class="hidden"><div id="routes-page"><div class="card"><h2 id="form-title">新增 Emby 节点</h2><div class="grid"><div><label>展示名称</label><input id="name" placeholder="某某公益服"></div><div><label>唯一短路径</label><input id="alias" placeholder="charity"></div><div class="wide"><label>主上游线路（分号或换行分隔，按故障自动切换）</label><textarea id="upstreams" placeholder="https://line-a.example.com&#10;https://line-b.example.com"></textarea></div><div class="wide"><label>播放专用线路（可选，用于前后端分离）</label><textarea id="playback-upstreams" placeholder="https://cdn.example.com"></textarea></div><div><label>访问保护</label><select id="access-mode"><option value="key">独立访问密钥（推荐）</option><option value="alias_only">仅别名（容易被扫描）</option></select></div><div><label>302 外链策略</label><select id="direct-stream"><option value="false">隐私中转（消耗本机流量）</option><option value="true">客户端直连（可能暴露客户端 IP）</option></select></div><div><label>私网回源</label><select id="private"><option value="false">阻止（推荐）</option><option value="true">明确允许</option></select></div><div><label>上游 TLS 验证</label><select id="tls"><option value="true">验证（推荐）</option><option value="false">关闭（高风险）</option></select></div><div><label>网关首页展示</label><select id="show-home"><option value="false">隐藏（推荐）</option><option value="true">展示名称</option></select></div><div><label>兼容性请求头</label><select id="profile-enabled"><option value="false">关闭</option><option value="true">启用（仅限获授权上游）</option></select></div><div><label>User-Agent</label><input id="profile-ua" placeholder="自定义兼容标识"></div><div><label>X-Emby-Client</label><input id="profile-client" placeholder="AuthorizedClient"></div><div><label>X-Emby-Device-Name</label><input id="profile-device" placeholder="AegisRelay"></div><div><label>X-Emby-Device-Id</label><input id="profile-device-id" placeholder="固定设备标识"></div></div><p class="actions"><button id="add" class="primary">创建节点</button><button id="cancel-edit" class="hidden">取消编辑</button></p><p class="muted">兼容性请求头仅用于你已获授权的 Emby 上游，不应被用于绕过服务器访问规则。上游配置会加密保存。</p></div><div class="card"><h2>服务器节点</h2><div id="routes"></div></div></div><div id="diagnostics-page" class="card hidden"><h2>线路熔断状态</h2><pre id="diagnostics"></pre></div><div id="audit-page" class="card hidden"><h2>安全审计</h2><pre id="audit"></pre></div></section>
<div id="modal" class="card hidden"><h2>请立即保存</h2><p class="notice">这是访问密钥唯一一次明文显示。不要截图、不要发送到聊天或工单。</p><div id="secret" class="secret"></div><p><button id="close-modal" class="primary">我已安全保存</button></p></div>
<script src="APP_JS"></script></main></body></html>
