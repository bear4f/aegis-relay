services:
  aegis-relay-agent:
    image: aegis-relay-agent:local
    restart: unless-stopped
    read_only: true
    init: true
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    user: "10001:10001"
    ports:
      - "${AGENT_PROXY_PUBLISH_IP:-127.0.0.1}:8080:8080"
    volumes:
      - ./data:/app/agent-data
    env_file: .env
    environment:
      # V8 sizes its heap off host RAM by default; cap it so the agent stays small next to Emby traffic.
      NODE_OPTIONS: --max-old-space-size=${AGENT_MAX_HEAP_MB:-192}
    tmpfs: ["/tmp:rw,noexec,nosuid,size=16m"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
