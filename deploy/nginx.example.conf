map $http_upgrade $aegis_connection_upgrade { default upgrade; '' close; }

# Reference only. scripts/configure-domain.sh generates this automatically and
# Certbot adds the HTTPS listener, certificate paths and HTTP -> HTTPS redirect.
server {
    listen 80;
    listen [::]:80;
    server_name panel.example.com;
    access_log off; # node capability keys are part of the URI
    client_max_body_size 0;

    location = /admin-random-path { return 301 /admin-random-path/; }
    location ^~ /admin-random-path/ {
        proxy_pass http://127.0.0.1:9080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $aegis_connection_upgrade;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
