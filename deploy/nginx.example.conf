map $http_upgrade $aegis_connection_upgrade { default upgrade; '' ''; }
upstream aegis_relay_backend {
    server 127.0.0.1:8080;
    keepalive 64;
}
upstream aegis_admin_backend {
    server 127.0.0.1:9080;
    keepalive 16;
}

# Reference only. scripts/configure-domain.sh generates this automatically and
# Certbot adds the HTTPS listener, certificate paths and HTTP -> HTTPS redirect.
server {
    listen 80;
    listen [::]:80;
    server_name panel.example.com;
    access_log off; # node capability keys are part of the URI
    client_max_body_size 0;

    location = /admin-random-path { return 301 /admin-random-path/; }
    location ^~ /admin-random-path/ {
        proxy_pass http://aegis_admin_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://aegis_relay_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $aegis_connection_upgrade;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_max_temp_file_size 0;
        proxy_ignore_headers X-Accel-Buffering X-Accel-Limit-Rate;
        proxy_socket_keepalive on;
        proxy_limit_rate 0;
        limit_rate 0;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        send_timeout 3600s;
    }
}
