services:
  aegis-relay:
    build: .
    restart: unless-stopped
    read_only: true
    init: true
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    user: "10001:10001"
    ports:
      - "${PROXY_PUBLISH_IP:-127.0.0.1}:8080:8080"
      - "${ADMIN_PUBLISH_IP:-127.0.0.1}:9080:9080"
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      # V8 sizes its heap off host RAM by default; cap it so the panel stays small on shared VPSes.
      NODE_OPTIONS: --max-old-space-size=${PANEL_MAX_HEAP_MB:-256}
    tmpfs: ["/tmp:rw,noexec,nosuid,size=16m"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:9080/'+process.env.ADMIN_PATH+'/api/status').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
